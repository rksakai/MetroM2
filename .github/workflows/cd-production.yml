# .github/workflows/cd-production.yml
# Acionado por: git tag v1.2.3  →  push --tags
# Cria release no GitHub + deploy produção

name: 🟢 CD — Release Production

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # ex: v1.0.0, v2.3.1

permissions:
  id-token: write
  contents: write               # para criar GitHub Release
  packages: write               # para push no GHCR

env:
  PYTHON_VERSION: "3.11"
  AZURE_RG: rg-real-estate-analysis
  API_APP_NAME: realestate-api-prod
  REGISTRY: ghcr.io
  IMAGE_NAME: \${{ github.repository }}/real-estate-api

jobs:

  # ── 1. Cria GitHub Release ────────────────────────────────────
  create-release:
    name: 📋 GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: \${{ steps.create_release.outputs.upload_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gera changelog desde última tag
        id: changelog
        run: |
          PREV_TAG=\$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "\$PREV_TAG" ]; then
            CHANGELOG=\$(git log \${PREV_TAG}..HEAD \
              --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=\$(git log --pretty=format:"- %s (%h)" \
              --no-merges -20)
          fi
          echo "changelog "\$GITHUB_OUTPUT"
          echo "\$CHANGELOG" >> "\$GITHUB_OUTPUT"
          echo "EOF" >> "\$GITHUB_OUTPUT"

      - name: Cria Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: \${{ github.ref_name }}
          release_name: "🏠 Real Estate Analysis \${{ github.ref_name }}"
          body: |
            ## 🚀 Release \${{ github.ref_name }}

            ### 📦 O que mudou
            \${{ steps.changelog.outputs.changelog }}

            ### 🔗 Links
            - 🌐 [API Produção](https://realestate-api-prod.azurewebsites.net)
            - 📖 [Documentação](https://realestate-api-prod.azurewebsites.net/docs)
            - 📊 [Dashboard](https://realestate-dashboard-prod.azurewebsites.net)

            ### 🐳 Docker
            ```bash
            docker pull ghcr.io/\${{ github.repository }}/real-estate-api:\${{ github.ref_name }}
            ```
          draft: false
          prerelease: false

  # ── 2. Build & Push Docker GHCR ──────────────────────────────
  build-and-push:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: \${{ env.REGISTRY }}
          username: \${{ github.actor }}
          password: \${{ secrets.GITHUB_TOKEN }}

      - name: Extrai metadados da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: \${{ env.REGISTRY }}/\${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build e push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: \${{ steps.meta.outputs.tags }}
          labels: \${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy Produção ────────────────────────────────────────
  deploy-production:
    name: 🚀 Deploy Produção
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: https://\${{ env.API_APP_NAME }}.azurewebsites.net

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: \${{ env.PYTHON_VERSION }}
          cache: pip

      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-mock httpx
          pytest tests/ -q -m "not integration" --tb=short
        env:
          ENVIRONMENT: test
          AZURE_STORAGE_ACCOUNT: ""
          KEY_VAULT_URI: ""

      - run: |
          zip -r app-api.zip . \
            -x "*.git*" -x "*__pycache__*" \
            -x "tests/*" -x "infra/*" -x ".env*"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: \${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: \${{ secrets.AZURE_TENANT_ID }}
          subscription-id: \${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy para Produção
        uses: azure/webapps-deploy@v3
        with:
          app-name: \${{ env.API_APP_NAME }}
          package: app-api.zip

      - name: Tag versão no Azure App Service
        run: |
          az webapp config appsettings set \
            --resource-group \${{ env.AZURE_RG }} \
            --name \${{ env.API_APP_NAME }} \
            --settings APP_VERSION=\${{ github.ref_name }}
