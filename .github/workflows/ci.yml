# .github/workflows/ci.yml
# ─────────────────────────────────────────────────────────────────
# CI Pipeline — executa em todo PR e push para main/develop
# Etapas: lint → type check → testes unitários → testes de integração
#         → cobertura → build Docker
# ─────────────────────────────────────────────────────────────────

name: 🧪 CI — Lint, Test & Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ci-\${{ github.ref }}
  cancel-in-progress: true   # cancela runs antigas do mesmo branch

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.2"

# ─────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & Format ──────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python \${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: \${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: |
          pip install --upgrade pip
          pip install ruff==0.4.4 black==24.4.2 isort==5.13.2 mypy==1.10.0

      - name: Ruff — linting (erros e estilo)
        run: ruff check . --output-format=github

      - name: Black — formatação
        run: black --check --diff .

      - name: isort — ordem dos imports
        run: isort --check-only --diff .

      - name: mypy — type checking
        run: |
          pip install -r requirements.txt
          mypy api/ ingestion/ processing/ ml/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-return-any
        continue-on-error: true   # não bloqueia por ora; vira erro na v2

  # ── 2. Testes Unitários ───────────────────────────────────────
  unit-tests:
    name: 🧪 Testes Unitários (Python \${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: [ "3.11", "3.12" ]   # testa em 2 versões
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: \${{ matrix.python-version }}
          cache: pip

      - name: Instala dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock httpx

      - name: Executa testes unitários
        env:
          ENVIRONMENT: test
          AZURE_STORAGE_ACCOUNT: ""
          KEY_VAULT_URI: ""
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=api \
            --cov=ingestion \
            --cov=processing \
            --cov=ml \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -m "not integration" \
            --junitxml=test-results.xml

      - name: Upload cobertura para Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload resultados de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-\${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 30

  # ── 3. Testes de Integração ───────────────────────────────────
  integration-tests:
    name: 🔗 Testes de Integração (FastAPI)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: \${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instala dependências
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Sobe serviços de suporte (Docker Compose)
        run: |
          docker compose up -d mlflow
          sleep 5

      - name: Executa testes de integração
        env:
          ENVIRONMENT: test
          API_URL: http://localhost:8000
          AZURE_STORAGE_ACCOUNT: ""
          KEY_VAULT_URI: ""
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            -m "integration" \
            --timeout=60 \
            --junitxml=integration-results.xml
        continue-on-error: true

      - name: Para serviços
        if: always()
        run: docker compose down

  # ── 4. Build Docker ───────────────────────────────────────────
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagem (sem push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: real-estate-api:ci-\${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Escaneia vulnerabilidades (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: real-estate-api:ci-\${{ github.sha }}
          format: table
          exit-code: 0          # avisa mas não bloqueia
          severity: HIGH,CRITICAL

  # ── 5. Resumo do PR ───────────────────────────────────────────
  ci-summary:
    name: ✅ CI Summary
    runs-on: ubuntu-latest
    needs: [ lint, unit-tests, docker-build ]
    if: always()

    steps:
      - name: Verifica se todos os jobs passaram
        run: |
          if [[ "\${{ needs.lint.result }}" != "success" || \
                "\${{ needs.unit-tests.result }}" != "success" || \
                "\${{ needs.docker-build.result }}" != "success" ]]; then
            echo "❌ CI falhou! Verifique os jobs acima."
            exit 1
          fi
          echo "✅ CI passou com sucesso!"
